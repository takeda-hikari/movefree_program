<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Flexbox演習</title>
    <link rel="stylesheet" href="kadai11-1.css">
</head>
<body>
    <h1>Flexboxカードレイアウト</h1>

    <div class="card-container">
        <div class="card">
            <h2>Card 1</h2>
            <p>これは最初のカードです。Flexboxを使って横並びに配置されます。</p>
        </div>
        <div class="card">
            <h2>Card 2</h2>
            <p>これは二番目のカードです。内容が少し長めです。</p>
            <p>Flexboxはコンテンツの量に関わらず柔軟な配置を可能にします。</p>
        </div>
        <div class="card">
            <h2>Card 3</h2>
            <p>これは三番目のカードです。</p>
        </div>
    </div>
</body>
