<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせフォーム演習</title>
</head>
<body>
    <h1>お問い合わせフォーム</h1>

    <form action="submit.php" method="post">
        <div>
            <label for="name">お名前 <span style="color: red;">*</span></label><br>
            <input type="text" id="name" name="user_name" placeholder="山田太郎" required>
        </div>
        <div>
            <label for="email">メールアドレス <span style="color: red;">*</span></label><br>
            <input type="email" id="email" name="user_email" placeholder="info@example.com" required>
        </div>
        <div>
            <label for="category">お問い合わせ種類：</label>
            <select id="category" name="category">
                <option value="question">ご質問</option>
                <option value="request">ご要望</option>
                <option value="other">その他</option>
            </select>
        </div>
        <div>
            <label for="message">お問い合わせ内容 <span style="color: red;">*</span></label><br>
            <textarea id="message" name="user_message" rows="5" placeholder="お問い合わせ内容を具体的にご記入ください。" maxlength="500" required></textarea>
        </div>
        <div>
            <p>性別:</p>
            <input type="radio" id="gender_male" name="gender" value="male">
            <label for="gender_male">男性</label>
            <input type="radio" id="gender_female" name="gender" value="female">
            <label for="gender_female">女性</label>
            <input type="radio" id="gender_no_answer" name="gender" value="no_answer" checked>
            <label for="gender_no_answer">回答しない</label>
        </div>
        <div>
            <p>興味のある分野:</p>
            <input type="checkbox" id="interest_webdesign" name="interests[]" value="webdesign">
            <label for="interest_webdesign">Webデザイン</label>
            <input type="checkbox" id="interest_programming" name="interests[]" value="programming">
            <label for="interest_programming">プログラミング</label>
            <input type="checkbox" id="interest_marketing" name="interests[]" value="marketing">
            <label for="interest_marketing">マーケティング</label>
        </div>
        <div>
            <input type="submit" value="送信する">
        </div>
    </form>
</body>
</html>
