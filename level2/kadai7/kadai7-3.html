<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画像と表の演習</title>
</head>
<body>
    <h1>今月のWebサイト訪問者数</h1>

    <table>
        <caption>今月のWebサイト訪問者数</caption>
        <thead>
            <tr>
                <th scope="col">月</th>
                <th scope="col">PCからのアクセス</th>
                <th scope="col">スマホからのアクセス</th>
                <th scope="col">合計</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1月</th>
                <td>5000</td>
                <td>8000</td>
                <td>13000</td>
            </tr>
            <tr>
                <th scope="row">2月</th>
                <td>4800</td>
                <td>8500</td>
                <td>13300</td>
            </tr>
            <tr>
                <th scope="row">3月</th>
                <td>5200</td>
                <td>9000</td>
                <td>14200</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
